# VNA 完整部署：Orthanc (DICOM) + BIDS Server (科研) + PostgreSQL
#
# 启动: docker compose -f docker-compose.vna.yml up -d
#
# 服务地址:
#   Orthanc Web UI:     http://localhost:8042
#   Orthanc DICOM:      localhost:4242
#   Orthanc DICOMweb:   http://localhost:8042/dicom-web/
#   BIDS Server API:    http://localhost:8080/bidsweb/v1/
#   BIDS Server Docs:   http://localhost:8080/docs
#   PostgreSQL:         localhost:5432

version: "3.8"

services:
  # ========== 数据库 ==========
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bids
      POSTGRES_PASSWORD: bids
      POSTGRES_DB: bidsserver
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bids -d bidsserver"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ========== DICOM Server (临床) ==========
  orthanc:
    image: orthancteam/orthanc:26.1.0
    ports:
      - "4242:4242"    # DICOM 协议
      - "8042:8042"    # HTTP API + Web UI
    environment:
      ORTHANC__NAME: "VNA-DICOM"
      ORTHANC__AUTHENTICATION_ENABLED: "false"
      ORTHANC__STORAGE_DIRECTORY: "/var/lib/orthanc/db"
      ORTHANC__INDEX_DIRECTORY: "/var/lib/orthanc/db"
      ORTHANC__DICOM_AET: "VNA-ORTHANC"
      ORTHANC__REST_API_ENABLED: "true"
      ORTHANC__DICOM_WEB__ENABLED: "true"
    volumes:
      - orthanc_data:/var/lib/orthanc/db
    restart: unless-stopped

  # ========== BIDS Server (科研) ==========
  bids-server:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://bids:bids@postgres:5432/bidsserver
      BIDS_ROOT: /bids_data
      UPLOAD_TEMP_DIR: /tmp/bids_uploads
      DEBUG: "false"
    volumes:
      - bids_data:/bids_data
      - bids_uploads:/tmp/bids_uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  orthanc_data:
  bids_data:
  bids_uploads:
