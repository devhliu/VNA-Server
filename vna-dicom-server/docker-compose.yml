services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-orthanc}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - orthanc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-orthanc}"]
      interval: 5s
      timeout: 3s
      retries: 10

  dicom-server:
    build: .
    image: vna-dicom-server:local
    container_name: vna-dicom-server-local
    ports:
      - "${ORTHANC_DICOM_PORT:-4242}:4242"
      - "${ORTHANC_HTTP_PORT:-8042}:8042"
    environment:
      DICOM_SERVER_USER: ${DICOM_SERVER_USER:?Set DICOM_SERVER_USER in .env}
      DICOM_SERVER_PASSWORD: ${DICOM_SERVER_PASSWORD:?Set DICOM_SERVER_PASSWORD in .env}
      DICOM_WEB_PLUGIN_ENABLED: "true"
      OHIF_PLUGIN_ENABLED: "true"
      ORTHANC__REGISTERED_USERS: '{"${DICOM_SERVER_USER}":"${DICOM_SERVER_PASSWORD}"}'
      VOLVIEW_PLUGIN_ENABLED: "true"
      ORTHANC_WEB_VIEWER_PLUGIN_ENABLED: "true"
      ORTHANC_EXPLORER_2_ENABLED: "true"
    volumes:
      - orthanc_data:/var/lib/orthanc/db
      - orthanc_storage:/var/lib/orthanc/storage
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import os, urllib.request; pm=urllib.request.HTTPPasswordMgrWithDefaultRealm(); pm.add_password(None, 'http://localhost:8042', os.environ.get('DICOM_SERVER_USER', ''), os.environ.get('DICOM_SERVER_PASSWORD', '')); opener=urllib.request.build_opener(urllib.request.HTTPBasicAuthHandler(pm)); opener.open('http://localhost:8042/system')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  orthanc_pgdata:
  orthanc_data:
  orthanc_storage:
