[pytest]
asyncio_mode = auto
testpaths = vna-main-server/tests vna-bids-server/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --cov=vna_main --cov=bids_server --cov-report=term-missing --cov-report=html --cov-fail-under=40
markers =
    integration: end-to-end integration tests requiring running services
    slow: slow-running tests
filterwarnings =
    ignore::DeprecationWarning

[coverage:run]
source = vna_main,bids_server
omit = */tests/*,*/db/migrations/*,*/__pycache__/*

[coverage:report]
show_missing = true
skip_covered = false
fail_under = 40
exclude_lines =
    pragma: no cover
    if TYPE_CHECKING:
    raise NotImplementedError
    @abstractmethod
