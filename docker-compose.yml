services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vna-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-18432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vna-admin} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-18379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  main-server:
    build:
      context: .
      dockerfile: vna-main-server/Dockerfile
    env_file:
      - .env
    ports:
      - "${MAIN_SERVER_PORT:-18000}:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/vna_main"
      DICOM_SERVER_URL: "http://dicom-server:8042"
      BIDS_SERVER_URL: "http://bids-server:8080"
      VNA_API_KEY: ${VNA_API_KEY}
      BIDS_SERVER_API_KEY: ${BIDS_SERVER_API_KEY}
      DICOM_SERVER_USER: ${DICOM_SERVER_USER:-vna-orthanc-user}
      DICOM_SERVER_PASSWORD: ${DICOM_SERVER_PASSWORD}
      REDIS_URL: "redis://redis:6379/0"
      REDIS_ENABLED: ${REDIS_ENABLED}
      CACHE_TTL: ${CACHE_TTL}
      DB_POOL_SIZE: ${DB_POOL_SIZE}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; r=httpx.get('http://localhost:8000/api/v1/internal/status'); r.raise_for_status()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  dicom-server:
    build: ./vna-dicom-server
    image: vna-dicom-server:local
    container_name: vna-orthanc
    env_file:
      - .env
    ports:
      - "${ORTHANC_DICOM_PORT:-18242}:4242"
      - "${ORTHANC_HTTP_PORT:-18042}:8042"
    environment:
      DICOM_SERVER_USER: ${DICOM_SERVER_USER:-vna-orthanc-user}
      DICOM_SERVER_PASSWORD: ${DICOM_SERVER_PASSWORD}
      DICOM_WEB_PLUGIN_ENABLED: "true"
      OHIF_PLUGIN_ENABLED: "true"
      ORTHANC__REGISTERED_USERS: '{"${DICOM_SERVER_USER:-vna-orthanc-user}":"${DICOM_SERVER_PASSWORD}"}'
      VOLVIEW_PLUGIN_ENABLED: "true"
      ORTHANC_WEB_VIEWER_PLUGIN_ENABLED: "true"
      ORTHANC_EXPLORER_2_ENABLED: "true"
      # Use filesystem storage for DICOM files instead of PostgreSQL (better for large datasets)
      ORTHANC__STORAGE_DIRECTORY: "/var/lib/orthanc/storage"
      ORTHANC__POSTGRESQL__ENABLESTORAGE: "false"
    volumes:
      - orthanc_data:/var/lib/orthanc/db
      - orthanc_storage:/var/lib/orthanc/storage
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import os, urllib.request; pm=urllib.request.HTTPPasswordMgrWithDefaultRealm(); pm.add_password(None, 'http://localhost:8042', os.environ.get('DICOM_SERVER_USER', 'vna-orthanc-user'), os.environ.get('DICOM_SERVER_PASSWORD', '')); opener=urllib.request.build_opener(urllib.request.HTTPBasicAuthHandler(pm)); opener.open('http://localhost:8042/system')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

  bids-server:
    build:
      context: .
      dockerfile: vna-bids-server/Dockerfile
    env_file:
      - .env
    ports:
      - "${BIDS_SERVER_PORT:-18080}:8080"
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/bidsserver"
      BIDS_ROOT: ${BIDS_ROOT}
      UPLOAD_TEMP_DIR: ${UPLOAD_TEMP_DIR}
      ENABLE_BACKGROUND_WORKER: ${ENABLE_BACKGROUND_WORKER}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL}
      BIDS_API_KEY: ${BIDS_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; r=httpx.get('http://localhost:8080/health'); r.raise_for_status()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - bids_data:/data01/vna_data
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  ux-server:
    build: ./vna-ux
    ports:
      - "${UX_PORT:-13000}:80"
    depends_on:
      main-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

volumes:
  pgdata:
  redis_data:
  orthanc_data:
  orthanc_storage:
  bids_data:
